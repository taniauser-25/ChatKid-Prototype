<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KidSafe Chat</title>
    <meta name="description" content="KidSafe Chat" />
    <link rel="icon" type="image/svg+xml" href="./Logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="bgCanvas" aria-hidden="true"></canvas>

    <div class="page-shell">
      <aside class="mood-dock" aria-label="Mood themes">
        <div class="mood-dock-title">Mood</div>

        <section class="mood-bar" aria-label="Mood">
          <button class="mood-btn" data-mood="default" title="Default">✨</button>
          <button class="mood-btn" data-mood="happy" title="Happy">😀</button>
          <button class="mood-btn" data-mood="sad" title="Sad">😢</button>
          <button class="mood-btn" data-mood="angry" title="Angry">😠</button>
          <button class="mood-btn" data-mood="crying" title="Crying">😭</button>
          <button class="mood-btn" data-mood="confused" title="Confused">😕</button>
        </section>

        <div class="avatar-picker-wrap">
          <div class="avatar-picker-label">Avatar</div>
          <section class="avatar-picker" aria-label="Choose avatar">
            <button class="avatar-btn active" data-avatar="📚" title="Book">📚</button>
            <button class="avatar-btn" data-avatar="😊" title="Smiley">😊</button>
            <button class="avatar-btn" data-avatar="💖" title="Heart">💖</button>
            <button class="avatar-btn" data-avatar="🎃" title="Pumpkin">🎃</button>
          </section>
        </div>
      </aside>

      <main class="chat-card">
        <header class="chat-header">
          <div class="title-wrap">
            <img class="brand-icon" src="./Logo.png" alt="" />
            <h1>ChatKid</h1>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <section id="unsafePrompt" class="unsafe-prompt hidden" aria-live="polite">
          <div class="unsafe-icon">!</div>
          <div class="unsafe-text-block">
            <div class="unsafe-title">Restricted topic detected</div>
            <div id="unsafeText" class="unsafe-text"></div>
          </div>
          <div class="unsafe-actions">
            <button id="notifyYesBtn" class="notify-btn yes">Yes</button>
            <button id="notifyNoBtn" class="notify-btn no">No</button>
          </div>
        </section>

        <footer class="composer-wrap">
          <div class="composer-row">
            <input
              id="messageInput"
              class="message-input"
              type="text"
              placeholder="Type your message..."
              autocomplete="off"
            />
            <button id="micBtn" class="mic-btn" type="button" aria-label="Voice input">🎤</button>
            <button id="sendBtn" class="send-btn" type="button">Send</button>
          </div>

          <section class="suggestions-bar" aria-label="Suggestions">
            <button class="suggestion-btn" data-suggestion="Why is the sky blue?">Why is the sky blue?</button>
            <button class="suggestion-btn" data-suggestion="Tell me about dolphins.">Tell me about dolphins.</button>
            <button class="suggestion-btn" data-suggestion="How do rainbows form?">How do rainbows form?</button>
            <button class="suggestion-btn" data-suggestion="What causes volcanoes to erupt?">What causes volcanoes to erupt?</button>
          </section>

          <div class="copyright">© <span id="copyrightYear"></span> Meherunnesa Tania</div>
        </footer>
      </main>
    </div>

    <button id="flaggedFab" class="flagged-fab" type="button" aria-label="Open flagged messages">
      <span class="flagged-fab-icon" aria-hidden="true">🚩</span>
      <span class="flagged-fab-text">Flagged</span>
      <span id="flaggedCount" class="flagged-fab-count hidden">0</span>
    </button>


    <div
      id="notifyModal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >
      <div class="modal-card">
        <div class="modal-icon">🔔</div>
        <h2 id="modalTitle">Parents have been notified</h2>
        <p>This is a popup-only prototype notification.</p>
        <button id="closeModalBtn" class="modal-close-btn" type="button">Close</button>
      </div>
    </div>



    <div
      id="flaggedModal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="flaggedTitle"
    >
      <div class="modal-card flagged-modal-card">
        <div class="modal-icon flagged-modal-icon">🚩</div>
        <h2 id="flaggedTitle">Flagged messages</h2>
        <p class="flagged-subtitle">Saved only on this device.</p>

        <div id="flaggedList" class="flagged-list" aria-live="polite"></div>

        <div class="flagged-modal-actions">
          <button id="clearFlaggedBtn" class="flagged-clear-btn" type="button">Clear</button>
          <button id="closeFlaggedBtn" class="modal-close-btn" type="button">Close</button>
        </div>
      </div>
    </div>


    <script src="./app.js"></script>
  </body>
</html>
